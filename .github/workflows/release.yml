name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install LLVM (whisper-rs bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: npm ci
        run: npm ci

      - name: Build, sign, and publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ello ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/FadhilahAfif/Ello/blob/main/CHANGELOG.md) for the full release notes.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
