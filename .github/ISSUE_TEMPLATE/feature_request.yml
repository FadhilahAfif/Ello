name: Feature request
description: Suggest an idea for Ello
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please search [existing issues](https://github.com/FadhilahAfif/Ello/issues?q=is%3Aissue+label%3Aenhancement)
        first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's the user need behind this request?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature you have in mind, including UI or behavior changes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you ruled them out.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this change?
      options:
        - Small tweak (existing UI / setting)
        - New page or workflow
        - New transcription backend or major architecture change
        - Not sure
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and discussions for duplicates.
          required: true
        - label: This request fits the v1 scope (Windows-only, dark theme, batch transcription). See README.md.
          required: false
